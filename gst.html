<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GST Calculator 🧮</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX translation in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [amount, setAmount] = useState(10000);
      const [gstRate, setGstRate] = useState(18);
      const [gstMode, setGstMode] = useState('exclude'); // 'include' or 'exclude'

      const calculateGST = () => {
        let basePrice = 0;
        let gstAmount = 0;
        let totalPrice = 0;

        const numericAmount = parseFloat(amount) || 0;

        if (gstMode === 'exclude') {
          basePrice = numericAmount;
          gstAmount = numericAmount * (gstRate / 100);
          totalPrice = numericAmount + gstAmount;
        } else {
          totalPrice = numericAmount;
          basePrice = numericAmount / (1 + (gstRate / 100));
          gstAmount = totalPrice - basePrice;
        }

        return {
          basePrice: basePrice.toFixed(2),
          gstAmount: gstAmount.toFixed(2),
          totalPrice: totalPrice.toFixed(2),
        };
      };

      const results = calculateGST();

      const handleInputChange = (e) => {
        const val = e.target.value;
        if (val === '') {
          setAmount('');
        } else {
          setAmount(Number(val));
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 font-sans text-gray-800">
          <div className="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            
            {/* Header */}
            <div className="bg-gray-900 px-6 py-5">
              <h1 className="text-xl font-bold text-white tracking-wide">GST Calculator 🧮</h1>
              <p className="text-gray-400 text-sm mt-1">Calculate Precise GST without worry 😌</p>
            </div>

            <div className="p-6 space-y-6">
              
              {/* Amount Input */}
              <div>
                <label className="text-sm font-semibold text-gray-700 mb-2 block">Amount (₹)</label>
                <input
                  type="number"
                  value={amount}
                  onChange={handleInputChange}
                  placeholder="Enter amount"
                  className="w-full px-4 py-3 text-lg border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-gray-900 outline-none transition-all font-mono bg-gray-50"
                />
              </div>

              {/* Include/Exclude Toggle */}
              <div>
                <label className="text-sm font-semibold text-gray-700 mb-2 block">GST Mode</label>
                <div className="flex bg-gray-100 p-1 rounded-lg">
                  <button
                    onClick={() => setGstMode('exclude')}
                    className={`flex-1 py-2 text-sm font-medium rounded-md transition-all ${
                      gstMode === 'exclude'
                        ? 'bg-white text-gray-900 shadow-sm'
                        : 'text-gray-500 hover:text-gray-700'
                    }`}
                  >
                    Exclude GST (+ Tax)
                  </button>
                  <button
                    onClick={() => setGstMode('include')}
                    className={`flex-1 py-2 text-sm font-medium rounded-md transition-all ${
                      gstMode === 'include'
                        ? 'bg-white text-gray-900 shadow-sm'
                        : 'text-gray-500 hover:text-gray-700'
                    }`}
                  >
                    Include GST (Inbuilt)
                  </button>
                </div>
              </div>

              {/* GST Bracket Selection */}
              <div>
                <label className="text-sm font-semibold text-gray-700 mb-2 block">GST Bracket</label>
                <div className="grid grid-cols-3 gap-3">
                  {[5, 18, 40].map((rate) => (
                    <button
                      key={rate}
                      onClick={() => setGstRate(rate)}
                      className={`py-3 text-sm font-bold rounded-lg border-2 transition-all ${
                        gstRate === rate
                          ? 'border-gray-900 bg-gray-900 text-white'
                          : 'border-gray-200 bg-white text-gray-600 hover:border-gray-300'
                      }`}
                    >
                      {rate}%
                    </button>
                  ))}
                </div>
              </div>

              <hr className="border-gray-100" />

              {/* Results Display */}
              <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-3">
                <div className="flex justify-between items-center text-sm">
                  <span className="text-gray-500">Base Price</span>
                  <span className="font-mono text-gray-800">₹{results.basePrice}</span>
                </div>
                <div className="flex justify-between items-center text-sm">
                  <span className="text-gray-500">GST Amount ({gstRate}%)</span>
                  <span className="font-mono text-gray-800 text-red-500">+ ₹{results.gstAmount}</span>
                </div>
                <div className="pt-2 mt-2 border-t border-gray-200 flex justify-between items-center">
                  <span className="font-bold text-gray-900">Total Price</span>
                  <span className="font-mono font-bold text-xl text-gray-900">₹{results.totalPrice}</span>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
